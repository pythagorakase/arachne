name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install MCP runtime
        run: python -m pip install --disable-pip-version-check "mcp==1.28.1"

      - name: Run real-process acceptance tests
        run: python -m unittest discover -s tests -v

      - name: Compile Python entry points
        run: >-
          python -m py_compile server.py mcp_server.py page_contract.py
          bin/bootstrap-url.py bin/publish-page.py

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install --yes shellcheck

      - name: Check shell entry points
        run: shellcheck bin/*.sh keepalive.sh
