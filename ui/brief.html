<li class="brief-item" data-brief-item>
  <button class="brief-card" type="button" aria-current="false"
    data-brief-name="@@ARACHNE_BRIEF_NAME@@"
    data-brief-issue="@@ARACHNE_BRIEF_ISSUE_ATTR@@"
    data-brief-title="@@ARACHNE_BRIEF_TITLE_ATTR@@"
    data-brief-status="@@ARACHNE_BRIEF_STATUS@@"
    data-part-count="0"
    data-ruling-sequence="@@ARACHNE_BRIEF_RULING_SEQUENCE@@">
    <span class="brief-meta-row">
      <span class="issue-chip">#@@ARACHNE_BRIEF_ISSUE@@</span>
      <time class="brief-time">@@ARACHNE_BRIEF_TIMESTAMP@@</time>
    </span>
    <span class="brief-title-row">
      <span class="brief-title">@@ARACHNE_BRIEF_TITLE@@</span>
      @@ARACHNE_BRIEF_RULING_SUFFIX@@
    </span>
    <span class="brief-progress" aria-label="Decision progress">
      <span class="brief-progress-track"><span></span></span>
      <span class="brief-progress-label">0/0 parts</span>
    </span>
  </button>
</li>
